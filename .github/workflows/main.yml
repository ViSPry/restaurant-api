name: Restaurant API CI with Docker

name: Restaurant API First Run

on: [push] # Запускати при кожному пуші

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Hello World Action
        run: echo "Перший пункт Actions активовано!"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Docker Image
        run: docker build -t restaurant-api .